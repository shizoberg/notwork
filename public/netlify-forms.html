<!doctype html>
<html lang="tr">
  <head>
    <meta charset="utf-8" />
    <meta name="robots" content="noindex" />
    <title>notwork form</title>
  </head>
  <body>
    <form name="notwork-community" method="POST" data-netlify="true">
      <input type="hidden" name="form-name" value="notwork-community" />
      <input type="hidden" name="subject" data-remove-prefix value="Yeni notwork sahne başvurusu" />
      <input type="text" name="name" />
      <input type="tel" name="phone" />
      <input type="email" name="email" />
      <select name="track">
        <option value="ilişki">İlişki</option>
        <option value="kariyer">Kariyer</option>
        <option value="macera">Macera</option>
      </select>
      <input type="text" name="title" />
      <textarea name="story"></textarea>
      <input type="url" name="slidesUrl" />
    </form>
  </body>
</html>
